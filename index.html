<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Litpersona · Kandidatų Analizė</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0e;
    --surface: #1a1917;
    --surface2: #232220;
    --border: #2e2c29;
    --text: #f0ede8;
    --text2: #9e9b96;
    --text3: #5c5a56;
    --accent: #e8c47a;
    --accent2: #c4a456;
    --green: #6dbd8a;
    --red: #e07070;
    --orange: #e0a060;
    --blue: #6aabe0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 0.5px;
  }
  .logo span { color: var(--text2); font-size: 13px; font-family: 'DM Sans', sans-serif; margin-left: 10px; font-weight: 300; }
  .stats-bar {
    display: flex;
    gap: 24px;
    align-items: center;
  }
  .stat { text-align: right; }
  .stat-n { font-family: 'DM Mono', monospace; font-size: 18px; color: var(--accent); }
  .stat-l { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }

  /* LAYOUT */
  .main { display: flex; height: calc(100vh - 57px); }

  /* SIDEBAR */
  .sidebar {
    width: 340px;
    min-width: 340px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-top {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .search-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent2); }
  .search-input::placeholder { color: var(--text3); }

  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 10px;
    color: var(--text2);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Mono', monospace;
  }
  .filter-btn:hover { border-color: var(--accent2); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 500; }
  .fc {
    display: inline-block;
    background: rgba(0,0,0,0.2);
    border-radius: 3px;
    padding: 0 5px;
    font-size: 10px;
    margin-left: 3px;
    min-width: 18px;
    text-align: center;
  }
  .filter-btn.active .fc { background: rgba(0,0,0,0.25); }

  .candidate-list { overflow-y: auto; flex: 1; }
  .candidate-list::-webkit-scrollbar { width: 4px; }
  .candidate-list::-webkit-scrollbar-track { background: transparent; }
  .candidate-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .candidate-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .candidate-item:hover { background: var(--surface); }
  .candidate-item.active { background: var(--surface2); border-left: 2px solid var(--accent); }

  .ci-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 13px;
    color: var(--accent2);
    flex-shrink: 0;
    margin-top: 1px;
  }
  .ci-info { flex: 1; min-width: 0; }
  .ci-name { font-weight: 500; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ci-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .ci-score {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 2px 7px;
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .score-high { background: rgba(109,189,138,0.15); color: var(--green); }
  .score-mid { background: rgba(224,160,96,0.15); color: var(--orange); }
  .score-low { background: rgba(224,112,112,0.15); color: var(--red); }
  .score-none { background: var(--surface2); color: var(--text3); }

  /* MAIN PANEL */
  .panel {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text3);
  }
  .empty-state-icon { font-size: 48px; opacity: 0.3; }
  .empty-state-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text2); }
  .empty-state-sub { font-size: 13px; text-align: center; max-width: 320px; line-height: 1.6; }

  /* CANDIDATE DETAIL */
  .candidate-header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .big-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--accent);
    flex-shrink: 0;
  }
  .ch-info h2 { font-family: 'DM Serif Display', serif; font-size: 24px; }
  .ch-info .ch-meta { color: var(--text2); font-size: 13px; margin-top: 4px; display: flex; gap: 16px; flex-wrap: wrap; }
  .ch-meta a { color: var(--blue); text-decoration: none; }
  .ch-meta a:hover { text-decoration: underline; }
  .ch-actions { margin-left: auto; display: flex; gap: 8px; }
  .btn {
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
    font-weight: 500;
  }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent2); color: var(--accent); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* SKILLS GRID */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .skill-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }
  .skill-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .skill-value { font-size: 13px; font-weight: 500; line-height: 1.4; }

  .level-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }
  .level-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* AI ANALYSIS BOX */
  .ai-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .ai-box-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .ai-box-title {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ai-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .ai-dot.done { background: var(--green); animation: none; }
  .ai-dot.idle { background: var(--text3); animation: none; }

  .ai-box-body { padding: 18px; }
  .ai-loading { color: var(--text3); font-style: italic; font-size: 13px; }

  .ai-result { display: flex; flex-direction: column; gap: 16px; }
  .ai-score-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .ai-score-big {
    font-family: 'DM Mono', monospace;
    font-size: 48px;
    font-weight: 500;
    line-height: 1;
  }
  .score-text-high { color: var(--green); }
  .score-text-mid { color: var(--orange); }
  .score-text-low { color: var(--red); }

  .ai-score-detail { flex: 1; }
  .ai-verdict { font-family: 'DM Serif Display', serif; font-size: 18px; margin-bottom: 4px; }
  .ai-pos-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: rgba(232,196,122,0.1);
    color: var(--accent);
    border: 1px solid rgba(232,196,122,0.2);
  }

  .ai-sections { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .ai-section { }
  .ai-section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text3);
    margin-bottom: 8px;
    font-family: 'DM Mono', monospace;
  }
  .ai-bullets { display: flex; flex-direction: column; gap: 5px; }
  .ai-bullet {
    font-size: 13px;
    line-height: 1.5;
    padding-left: 14px;
    position: relative;
    color: var(--text2);
  }
  .ai-bullet::before {
    content: '·';
    position: absolute;
    left: 0;
    font-weight: bold;
  }
  .ai-bullet.plus::before { content: '+'; color: var(--green); }
  .ai-bullet.minus::before { content: '−'; color: var(--red); }

  .ai-note {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text2);
    padding: 12px;
    background: var(--surface2);
    border-radius: 6px;
    border-left: 3px solid var(--accent2);
  }

  /* CHAT */
  .chat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .chat-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .chat-messages {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: 280px;
    overflow-y: auto;
  }
  .chat-messages::-webkit-scrollbar { width: 3px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); }
  .chat-msg {
    max-width: 85%;
    padding: 10px 13px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
  }
  .chat-msg.user {
    background: var(--accent);
    color: var(--bg);
    align-self: flex-end;
    border-bottom-right-radius: 2px;
  }
  .chat-msg.ai {
    background: var(--surface2);
    color: var(--text);
    align-self: flex-start;
    border-bottom-left-radius: 2px;
    border: 1px solid var(--border);
  }
  .chat-input-row {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }
  .chat-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .chat-input:focus { border-color: var(--accent2); }
  .chat-input::placeholder { color: var(--text3); }

  /* OVERVIEW */
  .overview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .ov-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .ov-n { font-family: 'DM Mono', monospace; font-size: 28px; color: var(--accent); }
  .ov-l { font-size: 12px; color: var(--text3); margin-top: 4px; }

  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @keyframes slideIn {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
</style>
</head>

// ─── PARSE ────────────────────────────────────────────────────────────────────
function parseData(raw) {
  const lines = raw.trim().split('\n');
  const headers = lines[0].split('\t');
  const seen = new Set();
  const candidates = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split('\t');
    const name = (cols[1] || '').trim();
    if (!name || name.length < 3) continue;
    const key = name.toLowerCase().replace(/\s+/g, '');
    if (seen.has(key)) continue;
    seen.add(key);
    candidates.push({
      id: i,
      timestamp: cols[0] || '',
      name: name,
      phone: (cols[2] || '').trim(),
      email: (cols[3] || '').trim(),
      klojinius: (cols[4] || '').trim(),
      armatūra: (cols[5] || '').trim(),
      brėžiniai: (cols[6] || '').trim(),
      pozicija: (cols[7] || '').trim(),
      vairuotojas: (cols[8] || '').trim(),
      išvykti: (cols[9] || '').trim(),
      įmonės: (cols[10] || '').trim(),
      score: null,
      analysis: null
    });
  }
  return candidates;
}

const candidates = parseData(RAW_DATA);
let currentCandidate = null;
let activeFilter = 'all';
let chatHistory = [];
let analyzedCount = 0;
let topCount = 0;

// Init
document.getElementById('total-count').textContent = candidates.length;

// ─── SCORING HELPERS ──────────────────────────────────────────────────────────
function quickScore(c) {
  let s = 0;
  if (c.klojinius.includes('pramoniniais tiek su buitiniais')) s += 3;
  else if (c.klojinius.includes('pramoniniais klojiniais Doka')) s += 2;
  else if (c.klojinius.includes('buitinius klojinius')) s += 1;
  if (c.armatūra.includes('Dideli projektai')) s += 3;
  else if (c.armatūra.includes('montažo darbai')) s += 2;
  else if (c.armatūra.includes('laiptų karkaso')) s += 2;
  else if (c.armatūra.includes('Maži projektai')) s += 1;
  if (c.brėžiniai.includes('sudėtingų')) s += 3;
  else if (c.brėžiniai.includes('paprastų')) s += 2;
  if (c.pozicija.includes('Team leader')) s += 2;
  if (c.vairuotojas === 'Taip') s += 1;
  if (c.įmonės && c.įmonės.length > 3) s += 1;
  return Math.min(Math.round((s / 13) * 100), 100);
}

function scoreClass(s) {
  if (s >= 75) return 'score-high';
  if (s >= 45) return 'score-mid';
  return 'score-low';
}
function scoreTextClass(s) {
  if (s >= 75) return 'score-text-high';
  if (s >= 45) return 'score-text-mid';
  return 'score-text-low';
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
}

// ─── FILTER & RENDER LIST ─────────────────────────────────────────────────────
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function matchesFilter(c, f) {
  if (f === 'team-leader') return c.pozicija.includes('Team leader');
  if (f === 'narys') return c.pozicija.includes('narys') && !c.pozicija.includes('Team');
  if (f === 'license') return c.vairuotojas === 'Taip';
  if (f === 'doka') return c.klojinius.includes('Doka') || c.klojinius.includes('pramoniniais tiek');
  return true;
}

function updateFilterCounts(search) {
  const filters = ['all', 'team-leader', 'narys', 'license', 'doka'];
  filters.forEach(f => {
    const count = candidates.filter(c => {
      if (search && !c.name.toLowerCase().includes(search) && !c.phone.includes(search)) return false;
      return matchesFilter(c, f);
    }).length;
    const el = document.getElementById('fc-' + f);
    if (el) el.textContent = count;
  });
}

function filterCandidates() { renderList(); }

function renderList() {
  const search = document.getElementById('search-input').value.toLowerCase();
  updateFilterCounts(search);
  const list = document.getElementById('candidate-list');
  list.innerHTML = '';
  const filtered = candidates.filter(c => {
    if (search && !c.name.toLowerCase().includes(search) && !c.phone.includes(search)) return false;
    return matchesFilter(c, activeFilter);
  });

  filtered.forEach(c => {
    const qs = c.score !== null ? c.score : quickScore(c);
    const item = document.createElement('div');
    item.className = 'candidate-item' + (currentCandidate?.id === c.id ? ' active' : '');
    item.onclick = () => selectCandidate(c);
    item.innerHTML = `
      <div class="ci-avatar">${initials(c.name)}</div>
      <div class="ci-info">
        <div class="ci-name">${c.name}</div>
        <div class="ci-meta">${c.pozicija.replace('Betonuotojų komandos ', '').replace('"Team leader"','TL')}</div>
      </div>
      <div class="ci-score ${c.analysis ? scoreClass(qs) : 'score-none'}">${c.analysis ? qs : '—'}</div>
    `;
    list.appendChild(item);
  });
}

// ─── SELECT CANDIDATE ─────────────────────────────────────────────────────────
function selectCandidate(c) {
  currentCandidate = c;
  chatHistory = [];
  renderList();
  renderDetail(c);
}

function klojiLevel(v) {
  if (v.includes('pramoniniais tiek su buitiniais')) return 100;
  if (v.includes('Doka')) return 80;
  if (v.includes('buitinius')) return 40;
  if (v.includes('nemoku')) return 5;
  return 20;
}
function armatLevel(v) {
  if (v.includes('Dideli')) return 100;
  if (v.includes('montažo')) return 80;
  if (v.includes('laiptų')) return 70;
  if (v.includes('Maži')) return 40;
  if (v.includes('neteko')) return 5;
  return 15;
}
function brezLevel(v) {
  if (v.includes('sudėtingų')) return 100;
  if (v.includes('paprastų')) return 60;
  if (v.includes('neturiu')) return 5;
  return 20;
}

// ─── AI ANALYSIS ──────────────────────────────────────────────────────────────
async function analyzeCandidate() {
  if (!currentCandidate) return;
  const apiKey = getApiKey();
  if (!apiKey) { showApiKeyModal(() => analyzeCandidate()); return; }
  const btn = document.getElementById('analyze-btn');
  btn.disabled = true; btn.textContent = 'Analizuojama...';

  const box = document.getElementById('ai-analysis-box');
  box.innerHTML = `
    <div class="ai-box">
      <div class="ai-box-header">
        <div class="ai-box-title"><div class="ai-dot"></div> AI analizuoja...</div>
      </div>
      <div class="ai-box-body"><div class="ai-loading">Claude analizuoja kandidato duomenis...</div></div>
    </div>`;

  const c = currentCandidate;
  const prompt = `Tu esi statybų įmonės atrankos specialistas. Analizuok šio betonuotojo kandidato duomenis ir pateik struktūruotą ataskaitą JSON formatu.

Kandidato duomenys:
- Vardas: ${c.name}
- Klojiniai: ${c.klojinius}
- Armatūra: ${c.armatūra}
- Brėžiniai: ${c.brėžiniai}
- Pageidaujama pozicija: ${c.pozicija}
- Vairuotojo pažymėjimas: ${c.vairuotojas}
- Kada gali išvykti: ${c.išvykti || 'nenurodyta'}
- Ankstesnės įmonės: ${c.įmonės || 'nenurodyta'}

Grąžink TIK JSON objektą (be markdown):
{
  "score": <0-100 skaičius>,
  "verdict": "<trumpas apibūdinimas, pvz. 'Stiprus kandidatas' arba 'Vidutinis specialistas'>",
  "level": "<'high'|'mid'|'low'>",
  "strengths": ["<stiprybė 1>", "<stiprybė 2>", "<stiprybė 3>"],
  "weaknesses": ["<silpnybė 1>", "<silpnybė 2>"],
  "recommendation": "<1-2 sakiniai ką rekomenduojate daryti su šiuo kandidatu>",
  "suitable_for": "<kokiems projektams tinka>"
}`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await resp.json();
    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const analysis = JSON.parse(clean);

    currentCandidate.analysis = analysis;
    currentCandidate.score = analysis.score;
    analyzedCount++;
    if (analysis.score >= 75) topCount++;
    document.getElementById('analyzed-count').textContent = analyzedCount;
    document.getElementById('top-count').textContent = topCount;

    box.innerHTML = renderAnalysisHTML(analysis, analysis.score);
    document.getElementById('chat-section').style.display = '';
    renderChatMessages();
    renderList();
    if (btn) { btn.disabled = false; btn.textContent = '✦ Iš naujo analizuoti'; }
  } catch (e) {
    box.innerHTML = `<div class="ai-box"><div class="ai-box-body"><div class="ai-loading">Klaida: ${e.message}</div></div></div>`;
    if (btn) { btn.disabled = false; btn.textContent = '✦ Analizuoti su AI'; }
  }
}

function renderAnalysisHTML(a, score) {
  return `
  <div class="ai-box">
    <div class="ai-box-header">
      <div class="ai-box-title"><div class="ai-dot done"></div> AI Analizė</div>
      <div class="ai-pos-tag">${a.suitable_for || ''}</div>
    </div>
    <div class="ai-box-body">
      <div class="ai-result">
        <div class="ai-score-row">
          <div class="ai-score-big ${scoreTextClass(score)}">${score}</div>
          <div class="ai-score-detail">

            <div style="font-size:12px;color:var(--text3);margin-top:4px">Bendras įvertinimas iš 100</div>

}

// ─── CHAT ─────────────────────────────────────────────────────────────────────
async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg || !currentCandidate) return;
  const apiKey = getApiKey();
  if (!apiKey) { showApiKeyModal(() => {}); return; }
  input.value = '';

  chatHistory.push({ role: 'user', content: msg });
  renderChatMessages();

  const btn = document.getElementById('chat-send-btn');
  btn.disabled = true;

  const c = currentCandidate;
  const systemCtx = `Tu esi statybų įmonės atrankos specialistas. Atsakyk lietuviškai, trumpai ir konkrečiai.
Kandidato duomenys: ${c.name}, klojiniai: ${c.klojinius}, armatūra: ${c.armatūra}, brėžiniai: ${c.brėžiniai}, pozicija: ${c.pozicija}, vairuotojas: ${c.vairuotojas}, išvykti: ${c.išvykti}, įmonės: ${c.įmonės}.
${c.analysis ? `AI įvertinimas: ${c.analysis.score}/100, ${c.analysis.verdict}` : ''}`;

  const messages = [
    { role: 'user', content: systemCtx + '\n\nKlausimas: ' + chatHistory[0].content },
    ...chatHistory.slice(1)
  ];

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages
      })
    });
    const data = await resp.json();
    const reply = data.content.map(b => b.text || '').join('');
    chatHistory.push({ role: 'assistant', content: reply });
    renderChatMessages();
  } catch (e) {
    chatHistory.push({ role: 'assistant', content: 'Klaida: ' + e.message });
    renderChatMessages();
  }
  btn.disabled = false;
}

function renderChatMessages() {
  const el = document.getElementById('chat-messages');
  if (!el) return;
  if (chatHistory.length === 0) {
    el.innerHTML = `<div style="color:var(--text3);font-size:13px;text-align:center;padding:12px">Užduokite klausimą apie šį kandidatą...</div>`;
    return;
  }
  el.innerHTML = chatHistory.map(m => `
    <div class="chat-msg ${m.role === 'user' ? 'user' : 'ai'}">${m.content.replace(/\n/g,'<br>')}</div>
  `).join('');
  el.scrollTop = el.scrollHeight;
}

function copyContact() {
  if (!currentCandidate) return;
  const c = currentCandidate;
  const text = `${c.name}\n${c.phone}\n${c.email}`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-secondary');
    if (btn) { btn.textContent = 'Nukopijuota!'; setTimeout(() => btn.textContent = 'Kopijuoti kontaktą', 2000); }
  });
}

// ─── FIREBASE ────────────────────────────────────────────────────────────────
const FIREBASE_URL = 'https://atrankos-caec6-default-rtdb.firebaseio.com/candidates';

let firebaseLoaded = false;

function showSyncStatus(msg, color) {
  const el = document.getElementById('sync-status');
  if (el) { el.textContent = msg; el.style.color = color || 'var(--text3)'; }
}

async function loadFromFirebase() {
  showSyncStatus('⟳ Kraunama...', 'var(--accent)');
  try {
    const resp = await fetch(FIREBASE_URL + '.json');
    const data = await resp.json();
    if (data) {
      const incoming = Object.values(data);
      mergeFirebaseCandidates(incoming);
    }
    showSyncStatus('● Prisijungta', 'var(--green)');
    firebaseLoaded = true;
  } catch(e) {
    showSyncStatus('✕ Klaida', 'var(--red)');
    console.error('Firebase load error:', e);
  }
}

function mapFirebaseCandidate(raw, index) {
  // Map Google Sheets column names to app fields
  const keys = Object.keys(raw);
  const get = (...searches) => {
    for (const s of searches) {
      const k = keys.find(k => k.toLowerCase().includes(s.toLowerCase()));
      if (k) return (raw[k] || '').toString().trim();
    }
    return '';
  };
  return {
    id: raw.id || raw.timestamp_unix || (Date.now() + index),
    timestamp: get('Timestamp', 'timestamp'),
    name: get('vardas ir pavardė', 'vardas', 'name'),
    phone: get('mob. tel', 'phone', 'tel'),
    email: get('el. pašto', 'email'),
    klojinius: get('klojiniais', 'klojinius'),
    armatūra: get('armatūros', 'armatura'),
    brėžiniai: get('brėžiniais', 'breziniais'),
    pozicija: get('pozicijoje', 'pozicija'),
    vairuotojas: get('vairuotojo', 'vairuotojas'),
    išvykti: get('išvykti', 'isvykti'),
    įmonės: get('įmones', 'imones', 'įmonės'),
    score: null,
    analysis: null,
    _raw: raw
  };
}

function mergeFirebaseCandidates(incoming) {
  const existingIds = new Set(candidates.map(c => c.name.toLowerCase().trim()));
  let addedCount = 0;
  incoming.forEach((raw, i) => {
    const mapped = mapFirebaseCandidate(raw, i);
    if (!mapped.name || mapped.name.length < 2) return;
    const key = mapped.name.toLowerCase().trim();
    if (!existingIds.has(key)) {
      candidates.unshift(mapped); // new ones at top
      existingIds.add(key);
      addedCount++;
    }
  });
  document.getElementById('total-count').textContent = candidates.length;
  renderList();
  return addedCount;
}

// Realtime polling — check for new entries every 15 seconds
function startRealtimeSync() {
  let lastCount = 0;
  async function poll() {
    try {
      const resp = await fetch(FIREBASE_URL + '.json?shallow=true');
      const data = await resp.json();
      if (!data) return;
      const count = Object.keys(data).length;
      if (count !== lastCount) {
        lastCount = count;
        const added = await loadAndMerge();
        if (added > 0) showNewCandidateToast(added);
      }
      showSyncStatus('● Prisijungta', 'var(--green)');
    } catch(e) {
      showSyncStatus('✕ Ryšio klaida', 'var(--red)');
    }
  }
  setInterval(poll, 15000);
}

async function loadAndMerge() {
  try {
    const resp = await fetch(FIREBASE_URL + '.json');
    const data = await resp.json();
    if (!data) return 0;
    return mergeFirebaseCandidates(Object.values(data));
  } catch(e) { return 0; }
}
